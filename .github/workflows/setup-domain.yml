name: Setup Custom Domain

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Add zone to Cloudflare
        id: add_zone
        run: |
          echo "Adding wanglaoshi.asia to Cloudflare..."
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"wanglaoshi.asia","account":{"id":"'"$CF_ACCOUNT_ID"'"},"type":"full"}')
          echo "$RESULT" | python3 -m json.tool
          ZONE_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('id',''))")
          NS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); ns=d.get('result',{}).get('name_servers',[]); print(' '.join(ns))")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "nameservers=$NS" >> $GITHUB_OUTPUT
          echo "============================="
          echo "ZONE ID: $ZONE_ID"
          echo "NAMESERVERS: $NS"
          echo "============================="

      - name: Add CNAME record for root domain
        if: steps.add_zone.outputs.zone_id != ''
        run: |
          ZONE_ID="${{ steps.add_zone.outputs.zone_id }}"
          echo "Adding CNAME record for wanglaoshi.asia -> teacher-booking-app.pages.dev"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"wanglaoshi.asia","content":"teacher-booking-app.pages.dev","proxied":true}' | python3 -m json.tool

      - name: Add CNAME record for www subdomain
        if: steps.add_zone.outputs.zone_id != ''
        run: |
          ZONE_ID="${{ steps.add_zone.outputs.zone_id }}"
          echo "Adding CNAME record for www.wanglaoshi.asia -> teacher-booking-app.pages.dev"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"www","content":"teacher-booking-app.pages.dev","proxied":true}' | python3 -m json.tool

      - name: Add custom domain to Cloudflare Pages
        run: |
          echo "Adding custom domain to Pages project..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/teacher-booking-app/domains" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"wanglaoshi.asia"}' | python3 -m json.tool

          echo "Adding www subdomain to Pages project..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/teacher-booking-app/domains" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"www.wanglaoshi.asia"}' | python3 -m json.tool

      - name: Summary
        run: |
          echo "============================================"
          echo "Domain setup complete!"
          echo ""
          echo "IMPORTANT: You must change your domain's nameservers at your registrar (Alibaba Cloud) to:"
          echo "  ${{ steps.add_zone.outputs.nameservers }}"
          echo ""
          echo "After nameserver change propagates (may take a few minutes to hours),"
          echo "your site will be available at:"
          echo "  https://wanglaoshi.asia"
          echo "  https://www.wanglaoshi.asia"
          echo "============================================"
