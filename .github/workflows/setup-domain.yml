name: Setup Custom Domain

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CF_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_KEY }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Add zone to Cloudflare
        id: add_zone
        run: |
          echo "Adding wanglaoshi.asia to Cloudflare..."
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"name":"wanglaoshi.asia","account":{"id":"'"$CF_ACCOUNT_ID"'"},"type":"full"}')
          echo "$RESULT" | python3 -m json.tool
          SUCCESS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))")
          ZONE_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result') or {}; print(r.get('id',''))" 2>/dev/null || echo "")
          NS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result') or {}; print(' '.join(r.get('name_servers',[])))" 2>/dev/null || echo "")
          
          if [ "$SUCCESS" != "True" ]; then
            echo "Zone creation returned success=false, checking if zone already exists..."
            EXISTING=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=wanglaoshi.asia" \
              -H "X-Auth-Email: $CF_EMAIL" \
              -H "X-Auth-Key: $CF_API_KEY")
            echo "$EXISTING" | python3 -m json.tool
            ZONE_ID=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',[]); print(r[0]['id'] if r else '')")
            NS=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',[]); print(' '.join(r[0].get('name_servers',[])) if r else '')")
          fi

          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "nameservers=$NS" >> $GITHUB_OUTPUT
          echo "============================="
          echo "ZONE ID: $ZONE_ID"
          echo "NAMESERVERS: $NS"
          echo "============================="

      - name: Add CNAME record for root domain
        if: steps.add_zone.outputs.zone_id != ''
        run: |
          ZONE_ID="${{ steps.add_zone.outputs.zone_id }}"
          echo "Adding CNAME for wanglaoshi.asia -> teacher-booking-app.pages.dev"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"wanglaoshi.asia","content":"teacher-booking-app.pages.dev","proxied":true}' | python3 -m json.tool

      - name: Add CNAME record for www
        if: steps.add_zone.outputs.zone_id != ''
        run: |
          ZONE_ID="${{ steps.add_zone.outputs.zone_id }}"
          echo "Adding CNAME for www.wanglaoshi.asia -> teacher-booking-app.pages.dev"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"www","content":"teacher-booking-app.pages.dev","proxied":true}' | python3 -m json.tool

      - name: Add custom domain to Pages project
        if: steps.add_zone.outputs.zone_id != ''
        run: |
          echo "Binding wanglaoshi.asia to Pages project..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/teacher-booking-app/domains" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"name":"wanglaoshi.asia"}' | python3 -m json.tool

          echo "Binding www.wanglaoshi.asia to Pages project..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/teacher-booking-app/domains" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"name":"www.wanglaoshi.asia"}' | python3 -m json.tool

      - name: Summary
        run: |
          echo "============================================"
          echo "Domain setup complete!"
          echo ""
          echo "Nameservers for wanglaoshi.asia:"
          echo "  ${{ steps.add_zone.outputs.nameservers }}"
          echo ""
          echo "NEXT STEP: Change nameservers at your domain registrar (Alibaba Cloud)"
          echo "to the Cloudflare nameservers shown above."
          echo ""
          echo "After DNS propagation, your site will be at:"
          echo "  https://wanglaoshi.asia"
          echo "============================================"
